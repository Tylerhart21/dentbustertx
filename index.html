<style>/* ---------- Dent Busters · Design Tokens ---------- */
:root {
  /* Surfaces */
  --bg: #0a0c11;
  --bg-1: #0f1219;
  --bg-2: #151923;
  --bg-3: #1c2230;
  --border: #1f2533;
  --border-soft: #161b26;
  --border-strong: #2a3242;

  /* Text */
  --fg: #f3f5f9;
  --fg-1: #c8cdd7;
  --fg-2: #8a93a4;
  --fg-3: #5d6677;

  /* Accent — matched to logo red */
  --accent: #cf362d;
  --accent-2: #dc4a41;
  --accent-hi: #ee5d52;
  --accent-dim: #9a2820;
  --accent-glow: rgba(207, 54, 45, 0.42);
  --accent-soft: rgba(207, 54, 45, 0.10);

  /* Type */
  --f-display: "Archivo", system-ui, sans-serif;
  --f-body: "Inter", system-ui, sans-serif;
  --f-mono: "JetBrains Mono", ui-monospace, monospace;

  /* Layout */
  --max: 1280px;
  --nav-h: 76px;

  /* Effects */
  --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
  --shadow-md: 0 8px 24px rgba(0,0,0,.45);
  --shadow-lg: 0 24px 60px rgba(0,0,0,.55);
  --shadow-accent: 0 14px 40px rgba(207,54,45,.30);

  --r-sm: 6px;
  --r: 10px;
  --r-lg: 14px;
  --r-xl: 22px;
  --r-full: 999px;

  --ease: cubic-bezier(.2,.7,.2,1);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--f-body);
  font-feature-settings: "ss01", "cv11";
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}
img { max-width: 100%; display: block; }
button { font-family: inherit; cursor: pointer; }
a { color: inherit; text-decoration: none; }

/* ---------- Typography ---------- */
.display {
  font-family: var(--f-display);
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 0.95;
}
.eyebrow {
  font-family: var(--f-display);
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-size: 11px;
  font-weight: 600;
  color: var(--fg-2);
}
.mono { font-family: var(--f-mono); }

/* ---------- Layout helpers ---------- */
.container {
  max-width: var(--max);
  margin: 0 auto;
  padding: 0 32px;
}
.section {
  padding: 120px 0;
  position: relative;
}
.section--tight { padding: 80px 0; }

@media (max-width: 768px) {
  .section { padding: 72px 0; }
  .container { padding: 0 20px; }
}

/* Decorative thin red line */
.accent-line {
  display: inline-block;
  width: 40px;
  height: 2px;
  background: var(--accent);
  vertical-align: middle;
}

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 22px;
  border-radius: var(--r);
  border: 1px solid transparent;
  font-family: var(--f-display);
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.02em;
  transition: all .2s var(--ease);
  white-space: nowrap;
  background: transparent;
  color: var(--fg);
}
.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: var(--shadow-accent);
}
.btn-primary:hover {
  background: var(--accent-2);
  transform: translateY(-1px);
  box-shadow: 0 18px 50px rgba(207,54,45,.42);
}
.btn-primary:active { transform: translateY(0) scale(.98); }
.btn-ghost {
  border-color: var(--border-strong);
  color: var(--fg);
  background: rgba(255,255,255,.02);
}
.btn-ghost:hover {
  border-color: var(--fg-2);
  background: rgba(255,255,255,.05);
}
.btn-lg { padding: 17px 28px; font-size: 15px; }
.btn-sm { padding: 10px 16px; font-size: 13px; }

/* ---------- Cards ---------- */
.card {
  background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  transition: border-color .25s var(--ease), transform .25s var(--ease);
}
.card:hover {
  border-color: var(--border-strong);
}

/* ---------- Inputs ---------- */
.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.field label {
  font-family: var(--f-display);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg-2);
}
.input, .select, .textarea {
  width: 100%;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--fg);
  font-family: var(--f-body);
  font-size: 15px;
  padding: 13px 14px;
  transition: border-color .15s, background .15s;
}
.input:focus, .select:focus, .textarea:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--bg-2);
}
.input::placeholder { color: var(--fg-3); }
.textarea { resize: vertical; min-height: 96px; }
.input.error { border-color: var(--accent); }
.field-err { color: var(--accent-2); font-size: 12px; margin-top: 2px; }

/* ---------- Subtle grid background ---------- */
.grid-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size: 56px 56px;
  mask-image: radial-gradient(ellipse at 50% 0%, rgba(0,0,0,1) 0%, transparent 70%);
  pointer-events: none;
}

/* ---------- Tag / chip ---------- */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border-radius: var(--r-full);
  background: var(--accent-soft);
  color: var(--accent-hi);
  border: 1px solid rgba(207,54,45,.25);
  font-family: var(--f-display);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

/* ---------- Section header ---------- */
.section-head {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 56px;
